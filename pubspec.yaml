name: quran_karim_app
description: "تطبيق القرآن الكريم - ورش وحفص مع أذان تلقائي"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # إدارة الحالة
  provider: ^6.1.2

  # قاعدة البيانات المحلية
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # الشبكة (تفسير + أوقات الصلاة)
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # التخزين المحلي البسيط (إعدادات، آخر قراءة)
  shared_preferences: ^2.2.3

  # الموقع الجغرافي
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # الإشعارات والتنبيهات (الأذان التلقائي)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  android_alarm_manager_plus: ^4.0.4

  # الصوت (تلاوة + الأذان)
  just_audio: ^0.9.40
  audio_service: ^0.18.15

  # التقويم الهجري
  hijri: ^3.0.0

  # الخطوط العربية (القرآن الكريم)
  google_fonts: ^6.2.1

  # أيقونات ورسومات
  flutter_svg: ^2.0.10+1

  # مشاركة المحتوى
  share_plus: ^9.0.0

  # قياس الاتجاه (القبلة)
  flutter_compass: ^0.8.1

  # تنسيق التاريخ/الوقت
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/warsh.json
    - assets/data/hafs.json
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Uthmani
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
    - family: WarshFont
      fonts:
        - asset: assets/fonts/UthmanicWarsh.ttf
